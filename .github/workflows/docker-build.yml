name: 构建并推送镜像

on:
  push:
    branches: [ "master" ]

env:
  GHCR_IMAGE: ghcr.io/${{ github.repository }}
  DOCKERHUB_IMAGE: ${{ github.repository }}
  RUN_URL: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      - name: 📥 拉取代码仓库
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: ⚙️ 配置 Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 🏷️ 提取 pyproject.toml 版本号
        id: get_version
        run: |
          # 提取 version = "0.1.0" 中的数字
          VERSION=$(grep -m 1 'version = ' pyproject.toml | cut -d '"' -f 2)
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "提取到版本号: $VERSION"

      - name: 🔑 登录 GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: 🔑 登录 Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: 📝 准备 Docker 镜像元数据
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ${{ env.GHCR_IMAGE }}
            ${{ env.DOCKERHUB_IMAGE }}
          tags: |
            type=raw,value=latest
            type=raw,value=${{ env.VERSION }}
            type=sha,prefix=

      - name: 📦 构建并推送镜像
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: 🔖 自动创建并推送 Git Tag
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          # 如果不存在该版本的 tag，则创建并推送
          if ! git rev-parse "v${{ env.VERSION }}" >/dev/null 2>&1; then
            git tag "v${{ env.VERSION }}"
            git push origin "v${{ env.VERSION }}"
            echo "已自动创建并推送 Tag: v${{ env.VERSION }}"
          else
            echo "Tag v${{ env.VERSION }} 已存在，跳过。"
          fi

      - name: 📢 发送钉钉构建通知
        if: always()
        env:
          WEBHOOK_URL: ${{ secrets.WEBHOOK_URL }}
        run: |
          RUN_URL="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          
          if [ "${{ job.status }}" == "success" ]; then
            MSG="#### ${{ github.repository }} \n\n > 构建状态：[成功 ✅](${{ env.RUN_URL }}) \n\n > 版本: v${{ env.VERSION }} \n\n > GHCR: ${{ env.GHCR_IMAGE }} \n\n > DockerHub: ${{ env.DOCKERHUB_IMAGE }}"          
            TITLE="✅ 构建成功！"
          else
            MSG="#### ${{ github.repository }} \n\n > 构建状态：[失败 ❌](${{ env.RUN_URL }}) \n\n > 版本: v${{ env.VERSION }} "
            TITLE="❌ 构建失败！"
          fi
          
          if [ -n "$WEBHOOK_URL" ]; then
             # 修正为钉钉的标准 JSON 结构
             curl -X POST "$WEBHOOK_URL" \
                  -H "Content-Type: application/json" \
                  -d "{
                    \"msgtype\": \"markdown\",
                    \"markdown\": {
                      \"title\": \"$MSG\",
                      \"text\": \"$MSG\"
                    }
                  }"
          fi

