name: Build and Push Docker Image

on:
  push:
    branches: [ "master" ]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=sha,prefix=

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # --- 通知步骤 ---
      - name: Send Notification
        if: always() # 无论成功失败都执行
        env:
          # 在这里引用 Secret
          WEBHOOK_URL: ${{ secrets.WEBHOOK_URL }}
        run: |
          if [ "${{ job.status }}" == "success" ]; then
            MSG="✅ [Video-Service] 镜像构建成功！\n请在 NAS 上执行 docker pull 更新。"
          else
            MSG="❌ [Video-Service] 镜像构建失败，请登录 GitHub 检查。"
          fi
          
          # 如果你有配置 Secret 才会发送，没配置则跳过
          if [ -n "$WEBHOOK_URL" ]; then
             # 这是一个简单的通用请求，根据你的接收端修改 JSON 结构
             curl -X POST -H "Content-Type: application/json" \
                  -d "{\"msg_type\":\"text\",\"content\":{\"text\":\"$MSG\"}}" \
                  "$WEBHOOK_URL"
          else
             echo "没有配置 WEBHOOK_URL，跳过通知发送。"
          fi